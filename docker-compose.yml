services:
  api:
    build: .
    container_name: fleet_api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=postgres
      - RABBITMQ_HOST=rabbitmq
      - MQTT_BROKER=tcp://mosquitto:1883
    depends_on:
      - postgres
      - rabbitmq
      - mosquitto

  postgres:
    image: postgres:16
    container_name: fleet_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fleet_management
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
    - "5432:5432"
    volumes:
    - postgres_data:/var/lib/postgresql/data
    - ./migrations:/docker-entrypoint-initdb.d

  rabbitmq:
    image: rabbitmq:3-management
    container_name: fleet_rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: fleet_mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./deployments/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf

volumes:
  postgres_data:
